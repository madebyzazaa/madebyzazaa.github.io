<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The latest Fresh Universe drops are live. Limited-run graphic tees and heavy street sets engineered for the asphalt. Lock your position before they're gone.">
    <title>New Drops & Limited Releases | Fresh Universe</title>
    <link rel="stylesheet" href="/css/drop.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
<div class="navigation-bar">
    <div class="logo-box"><img src="images/fresh-universe-globe-logo.webp" class="fresh-logo" alt="Fresh Universe minimalist white wireframe globe logo with an orbital ring">
    <p class="brand-txt">Fresh universe</p>
    </div>
    <nav class="nav">
        <ul class="navigation-href-list">
            <li><a href="home" class="navigation-href">HOME</a></li>
            <li><a href="collection" class="navigation-href">COLLECTION</a></li>
            <li><a href="drop" class="navigation-href">NEW DROPS</a></li>
            <li><a href="perks" class="navigation-href">FRESH PERKS</a></li>
        </ul>
    </nav>
    <a href="http://freshuniverseworld.myshopify.com/" target="_blank" class="shopify-link"><img class="shopify-link-img" src="images/shopping_bag_icon.webp" class="" alt="shopping bag icon"></a>
</div>
</header>
<div>
    <main>
        <section>
            <div class="hero-box">
            <img class="hero-img" src="images/fresh-universe-money-oversized-tee.jpg.webp" alt="A brand model looking to the side while wearing the Fresh Universe white oversized graphic t-shirt featuring a repeating black M$NEY typography print against a solid black background.">
            <h1 class="drop-txt">NEXT DROP IN</h1>
            <div class="next-drop-box">
            <div class="timer-card">
    <h2 id="timer" class="timer-digits">00:00:00:00</h2>
    <span class="timer-labels">DAYS   HR MIN SEC</span>
  </div>
            <button class="notify-btn">NOTIFY ME</button>
        </div></div> 
        </section>
        <section class="drop-info">
            <h2 class="drop-info-header">DROP DETAILS</h2>
           <div class="info-content">
            <img id="drop-img" src="images/fresh-universe-no-available-drop-default.webp" class="drop-preview" alt="default fallback no available drop image">
            <div class="drop-specs-container">
    
  <h3>PRODUCT_ARCHIVE_SPECIFICATIONS</h3>
  <div class="spec-row">
    <span class="spec-label">ITEM:</span>
    <span id="item" class="spec-value">nothing for now</span>
  </div>
  
  <div class="spec-row">
    <span class="spec-label">BUILD:</span>
    <span id="build" class="spec-value">nothing for now</span>
  </div>
  
  <div class="spec-row">
    <span class="spec-label">GRAPHIC:</span>
    <span id="graphic" class="spec-value">nothing for now</span>
  </div>
  
  <div class="spec-row">
    <span class="spec-label">FIT:</span>
    <span id="fit" class="spec-value">nothing for now</span>
  </div>

  <div class="spec-row">
    <span class="spec-label">SCARCITY:</span>
    <span id="scarcity" class="spec-value">nothing for now</span>
  </div>
</div>
</div>
        </section>
    </main>
</div>
</body>
<script src="js/screen.js"></script>
<script src="js/drop.js"></script>
</html>
